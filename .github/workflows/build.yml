name: Build Czech hockey calendars

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'  # fallback daily refresh
  workflow_dispatch:
permissions:
  contents: write
  workflows: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendars
        run: python generate.py

      - name: Update cron schedule
        run: python update_schedule.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist .github/workflows/build.yml || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update calendars and schedule"
            git push
          fi
